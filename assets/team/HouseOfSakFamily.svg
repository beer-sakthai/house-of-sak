<!-- connecting lines -->
<line x1="220" y1="250" x2="340" y2="250" stroke="#4c1d95" stroke-width="2" opacity="0.4"/>
<line x1="580" y1="250" x2="460" y2="250" stroke="#4c1d95" stroke-width="2" opacity="0.4"/>
</svg>