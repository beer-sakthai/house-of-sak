<circle cx="480" cy="270" r="30" fill="#f59e0b" opacity="0.8"/>
<path d="M450 340 Q480 280 510 340 Z" fill="#f59e0b" opacity="0.8"/>
<circle cx="580" cy="250" r="35" fill="#22c55e" opacity="0.85"/>
