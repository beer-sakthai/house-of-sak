    <stop offset="0%" stop-color="#1e1b4b"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
</defs>
<rect width="800" height="400" fill="url(#sky)"/>
<!-- house -->
